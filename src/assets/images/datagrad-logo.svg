<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f4f1eb"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="dgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17324d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f5d7c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main badge - rounded square -->
  <rect x="50" y="50" width="100" height="100" rx="20" fill="url(#dgGradient)"/>
  
  <!-- DG Text -->
  <text x="100" y="115" font-family="Sora, sans-serif" font-size="56" font-weight="700" 
        text-anchor="middle" fill="#f8fafc" letter-spacing="0.08em">
    DG
  </text>
</svg>