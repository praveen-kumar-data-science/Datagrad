
<header class="site-header">
  <mat-toolbar class="site-toolbar">
    <a class="brand" routerLink="/" aria-label="DataGrad home">
      <span class="brand-mark">DG</span>
      <span class="brand-copy">
        <span class="brand-name">DataGrad</span>
        <span class="brand-tagline">Data engineering career launchpad</span>
      </span>
    </a>

    <span class="example-spacer"></span>

    <nav *ngIf="!isSmallScreen" class="desktop-links" aria-label="Primary navigation">
      <a mat-button routerLink="/" fragment="what-we-do">What we do</a>
      <a mat-button routerLink="/" fragment="curriculum-details">Curriculum</a>
      <a mat-button routerLink="/" fragment="contact">Contact</a>
    </nav>

    <a *ngIf="!isSmallScreen" mat-flat-button routerLink="/" fragment="contact" class="header-cta">
      Book a Consultation
    </a>

    <button
      mat-icon-button
      *ngIf="isSmallScreen"
      (click)="toggleSidenav()"
      class="menu-button"
      aria-label="Open navigation menu">
      <mat-icon>menu</mat-icon>
    </button>
  </mat-toolbar>

  <mat-sidenav-container *ngIf="isSmallScreen" class="mobile-nav-shell">
    <mat-sidenav #sidenav mode="over" position="end" class="mobile-nav">
      <a mat-button routerLink="/" fragment="what-we-do" (click)="sidenav.close()">What we do</a>
      <a mat-button routerLink="/" fragment="curriculum-details" (click)="sidenav.close()">Curriculum</a>
      <a mat-button routerLink="/" fragment="contact" (click)="sidenav.close()">Contact</a>
      <a mat-flat-button routerLink="/" fragment="contact" class="header-cta mobile-cta" (click)="sidenav.close()">
        Book a Consultation
      </a>
    </mat-sidenav>
  </mat-sidenav-container>
</header>
